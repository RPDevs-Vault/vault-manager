name: Organization Health Dashboard

on:
  schedule:
    - cron: '0 9 * * 1' # Weekly on Monday at 09:00
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Generate Health Report
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          REPOS=$(gh repo list --limit 1000 --json nameWithOwner,isFork,visibility,isArchived --jq '.')
          
          TOTAL_REPOS=$(echo "$REPOS" | jq 'length')
          TOTAL_FORKS=$(echo "$REPOS" | jq '[.[] | select(.isFork == true)] | length')
          TOTAL_STANDALONE=$(echo "$REPOS" | jq '[.[] | select(.isFork == false)] | length')
          TOTAL_ARCHIVED=$(echo "$REPOS" | jq '[.[] | select(.isArchived == true)] | length')
          
          # Initialize report section
          REPORT="## đź›ˇď¸Ź Repository Health Overview\n\n"
          REPORT+="| Metric | Count |\n"
          REPORT+="| :--- | :--- |\n"
          REPORT+="| **Total Repositories** | $TOTAL_REPOS |\n"
          REPORT+="| **Total Forks** | $TOTAL_FORKS |\n"
          REPORT+="| **Standalone Projects** | $TOTAL_STANDALONE |\n"
          REPORT+="| **Archived Projects** | $TOTAL_ARCHIVED |\n\n"
          
          # Find potentially unhealthy repos (Missing Description or extremely old)
          UNHEALTHY=$(echo "$REPOS" | jq -r '.[] | select(.isArchived == false) | select(.description == null or .description == "") | .nameWithOwner')
          
          REPORT+="### âš ď¸Ź Attention Required\n"
          if [[ ! -z "$UNHEALTHY" ]]; then
            REPORT+="The following repositories are missing descriptions:\n"
            for r in $UNHEALTHY; do
              REPORT+="- \`$r\`\n"
            done
          else
            REPORT+="All active repositories have metadata populated. âś…\n"
          fi

          # Use sed to replace the section in README.md
          # This assumes a marker <!-- HEALTH_DASHBOARD_START --> and <!-- HEALTH_DASHBOARD_END -->
          
          # First, ensure markers exist
          if ! grep -q "<!-- HEALTH_DASHBOARD_START -->" README.md; then
            echo -e "\n<!-- HEALTH_DASHBOARD_START -->\n<!-- HEALTH_DASHBOARD_END -->" >> README.md
          fi
          
          # Create temporary README
          awk -v report="$REPORT" '
            /<!-- HEALTH_DASHBOARD_START -->/ { print; print report; skip=1; next }
            /<!-- HEALTH_DASHBOARD_END -->/ { skip=0 }
            !skip { print }
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Commit & Push
        run: |
          git config user.name "Health Bot"
          git config user.email "actions@github.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: auto-update health dashboard"
            git push origin main
          fi
