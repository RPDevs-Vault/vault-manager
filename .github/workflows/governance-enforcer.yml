name: Governance Enforcer

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00
  workflow_dispatch:

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce Governance Policies
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          REPOS=$(gh repo list --limit 1000 --json nameWithOwner --jq '.[].nameWithOwner')
          
          for repo in $REPOS; do
            echo "Processing governance for $repo..."
            
            # 1. Get default branch
            DEFAULT_BRANCH=$(gh repo view "$repo" --json defaultBranchRef --jq '.defaultBranchRef.name' 2>/dev/null)
            if [ -z "$DEFAULT_BRANCH" ]; then continue; fi

            # 2. Apply Branch Protection (Standard API for Free Plan)
            # - Disable Force Push
            # - Disable Deletion
            # Note: For public repos on Free plan, this requires specific headers.
            # We will use the REST API to update protection settings.
            gh api -X PUT "/repos/$repo/branches/$DEFAULT_BRANCH/protection" \
              -H "Accept: application/vnd.github+json" \
              -f "required_status_checks=null" \
              -f "enforce_admins=null" \
              -f "required_pull_request_reviews=null" \
              -f "restrictions=null" \
              -F "allow_force_pushes=false" \
              -F "allow_deletions=false" --silent || echo "Failed branch protection for $repo"

            # 3. Enable Secret Scanning & Push Protection (Public Repos Only)
            VISIBILITY=$(gh repo view "$repo" --json visibility --jq '.visibility')
            if [[ "$VISIBILITY" == "PUBLIC" ]]; then
              gh api -X PATCH "/repos/$repo" \
                -f "security_and_analysis[secret_scanning][status]=enabled" \
                -f "security_and_analysis[secret_scanning_push_protection][status]=enabled" --silent || echo "Failed security settings for $repo"
            fi
            
            # 4. Email Policy Audit (Log check)
            # Scan recent commits to see if non-conforming emails are being used
            COMMITS=$(gh api "/repos/$repo/commits" --jq '.[] | select(.commit.author.email != "rpdev@iamrp.dev" and .commit.author.email != "actions@github.com") | .commit.author.email' | sort -u)
            if [ ! -z "$COMMITS" ]; then
              echo "|$repo|Non-conforming emails found: $COMMITS|"
            fi
          done
